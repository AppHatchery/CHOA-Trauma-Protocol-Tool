.msg.u{align-self:flex-end;flex-direction:row-reverse}
.msg.a{align-self:flex-start}
.apip{width:26px;height:26px;border-radius:50%;background:var(--pip);color:var(--on-pip);font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bub{padding:10px 13px;border-radius:16px;font-size:13px;line-height:1.55;word-break:break-word}
.msg.u .bub{background:var(--blue);color:var(--on-accent);border-bottom-right-radius:4px}
.msg.a .bub{background:var(--card);color:var(--t1);border:1px solid var(--border);border-bottom-left-radius:4px;box-shadow:var(--sh)}
.bub.typing{display:flex;gap:5px;align-items:center;padding:14px 16px;min-width:60px}
.tdot{width:7px;height:7px;border-radius:50%;background:var(--border2);animation:td 1s infinite}
.tdot:nth-child(2){animation-delay:.15s}.tdot:nth-child(3){animation-delay:.3s}
@keyframes td{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.cia{padding:10px 14px 14px;background:var(--card);border-top:1px solid var(--border);flex-shrink:0}
.cib{display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid var(--border);border-radius:24px;padding:0 8px 0 14px}
.cib:focus-within{border-color:var(--blue)}
.ci{flex:1;border:none;background:none;padding:11px 0;font-size:14px;font-family:inherit;color:var(--t1);outline:none}
.ci::placeholder{color:var(--t3)}
.csnd{width:36px;height:36px;border-radius:18px;background:var(--blue);color:var(--on-accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.csnd:active{background:var(--blue-dk)}.csnd:disabled{background:var(--border2);cursor:default}
@media(hover:hover) and (pointer:fine){.csnd:hover:not(:disabled){background:var(--blue-dk)}}
</style>

// ── ICON HELPER ───────────────────────────────────────────────────

// ── ALL 16 PROTOCOL TREES ─────────────────────────────────────────
const T={
  cspine:{start:'n0',nodes:{
    n0:{q:'Is the patient unconscious?',k:'Entry',opts:[{l:'Yes — unconscious',s:'warn',nx:'n1'},{l:'No — conscious',s:'ok',nx:'n2'}]},
    n1:{q:'Anticipated unconscious more than 48 hours?',k:'Unconscious patient',opts:[{l:'Yes',s:'warn',nx:'En'},{l:'No — expected recovery within 48 hrs',s:'ok',nx:'Ep'}]},
    n2:{q:'Neurological deficit present?',k:'Neurological assessment',info:'Paresthesia, neck pain, limited ROM, or sensory-motor deficits.',opts:[{l:'Yes — deficit present',s:'warn',nx:'En'},{l:'No — no deficit',s:'ok',nx:'n3'}]},
    n3:{q:'All four clinical clearance criteria met?',k:'Clinical clearance',checks:['Cooperative with exam','Not complaining of pain','Not tender on palpation','No pain on active range of motion'],opts:[{l:'Yes — all four met',s:'ok',nx:'Ec'},{l:'No — one or more not met',s:'warn',nx:'n4'}]},
    n4:{q:'AP and lateral C-spine films reviewed as negative?',k:'Imaging',opts:[{l:'Yes — films normal',s:'ok',nx:'n5'},{l:'No — films abnormal',s:'warn',nx:'En'}]},
    n5:{q:'All four criteria now met post-imaging?',k:'Post-imaging check',opts:[{l:'Yes — all met',s:'ok',nx:'Ec'},{l:'No — still symptomatic',s:'warn',nx:'En'}]}
  },ends:{
    En:{type:'esc',tag:'Escalation required',title:'Call for Neurosurgery Consult',body:'Patient remains in collar. Neurosurgery determines imaging type and timing. Target clearance within 72 hrs.'},
    Ep:{type:'ok',tag:'Admission pathway',title:'Admit to PICU in C-collar',body:'Anticipate clearance within 48 hrs. Monitor for ability to clear as patient recovers.'},
    Ec:{type:'clr',tag:'Patient cleared',title:'Cleared — No Films Required',body:'Document in EMR. Write order to discontinue cervical collar. May be removed by Physician, APP, or RN.'}
  }},
  tta:{start:'t0',nodes:{
    t0:{q:'Penetrating mechanism to torso, neck, or proximal extremity?',k:'Penetrating trauma screen',opts:[{l:'Yes — penetrating trauma',s:'warn',nx:'Es'},{l:'No — blunt or unknown',s:'ok',nx:'t1'}]},
    t1:{q:'Any physiologic criteria present?',k:'Physiologic criteria',info:'SBP < 90 mmHg · GCS < 14 · RR < 10 or > 29 · Intubated pre-hospital',opts:[{l:'Yes — physiologic instability',s:'warn',nx:'Es'},{l:'No — stable',s:'ok',nx:'t2'}]},
    t2:{q:'Any mechanism criteria present?',k:'Mechanism criteria',info:'Ejection from vehicle · Death in same vehicle · Fall > 15 ft · Pedestrian struck · Rollover',opts:[{l:'Yes — high-risk mechanism',s:'warn',nx:'Ea'},{l:'No mechanism criteria',s:'ok',nx:'t3'}]},
    t3:{q:'Any anatomic criteria present?',k:'Anatomic criteria',info:'Suspected spinal cord injury · Traumatic amputation · Open/depressed skull fracture · Two or more proximal long bone fractures',opts:[{l:'Yes — anatomic concern',s:'warn',nx:'Ea'},{l:'No criteria met',s:'ok',nx:'Ee'}]}
  },ends:{
    Es:{type:'esc',tag:'STAT activation',title:'STAT Trauma Team Activation',body:'Activate full trauma team immediately. Notify OR and blood bank. Trauma surgeon leads resuscitation on arrival.'},
    Ea:{type:'ok',tag:'Alert activation',title:'Trauma Alert Activation',body:'Trauma team to ED within 5 minutes. Attending and resident required. Reassess for STAT upgrade if patient deteriorates.'},
    Ee:{type:'clr',tag:'Eval',title:'Trauma Eval',body:'Does not meet STAT or Alert criteria. Trauma surgery consult at attending discretion. Document clinical reasoning.'}
  }},
  bat:{start:'b0',nodes:{
    b0:{q:'Is the patient hemodynamically stable?',k:'Hemodynamic assessment',info:'Stable: SBP > 90, HR < 120, responds to resuscitation',opts:[{l:'No — hemodynamically unstable',s:'warn',nx:'bu'},{l:'Yes — stable',s:'ok',nx:'b1'}]},
    bu:{q:'FAST exam positive for free fluid?',k:'Unstable — FAST',opts:[{l:'Yes — free fluid on FAST',s:'warn',nx:'Eor'},{l:'No or indeterminate',s:'ok',nx:'Er'}]},
    b1:{q:'Significant mechanism or clinical concern?',k:'Clinical assessment',info:'Direct blow · Seatbelt sign · Ecchymosis · Tenderness · Hematuria · Elevated LFTs',opts:[{l:'Yes — concern present',s:'warn',nx:'b2'},{l:'No — low concern',s:'ok',nx:'Eob'}]},
    b2:{q:'CT abdomen/pelvis — solid organ injury identified?',k:'CT imaging',opts:[{l:'Yes — solid organ injury',s:'warn',nx:'Eat'},{l:'No — CT negative',s:'ok',nx:'Eob'}]}
  },ends:{
    Eor:{type:'esc',tag:'Operative',title:'Emergent OR',body:'Unstable with positive FAST. Immediate operative intervention. Activate MTP. Notify OR and trauma attending.'},
    Er:{type:'ok',tag:'Resuscitation',title:'Aggressive Resuscitation and Reassess',body:'Resuscitate with blood products. Reassess hemodynamics. Consider CT if patient responds.'},
    Eat:{type:'ok',tag:'Non-operative',title:'ATOMAC Non-Operative Protocol',body:'Admit to PICU. Graded management of liver, spleen, or kidney injury. Serial abdominal exams q4h.'},
    Eob:{type:'clr',tag:'Observation',title:'Clinical Observation',body:'No acute injury. Serial exams. Repeat labs at 6 hours. Discharge with return precautions if stable.'}
  }},
  mtp:{start:'p0',nodes:{
    p0:{q:'Is the patient currently in the Emergency Department?',k:'Patient location',opts:[{l:'Yes — patient in ED',s:'ok',nx:'p1'},{l:'No — OR, ICU, or floor',s:'warn',nx:'pn'}]},
    pn:{q:'Attending confirmed activation criteria?',k:'Non-ED activation',info:'Two or more of: HR > 100 · SBP < 90 · pH < 7.25 · Temp < 35°C · Active uncontrolled hemorrhage',opts:[{l:'Yes — criteria confirmed',s:'warn',nx:'Eac'},{l:'No',s:'ok',nx:'Era'}]},
    p1:{q:'Two or more clinical MTP triggers present?',k:'ED activation criteria',info:'HR > 100 · SBP < 90 · pH < 7.25 · Temp < 35°C · Active hemorrhage',opts:[{l:'Yes — two or more triggers',s:'warn',nx:'Eac'},{l:'No — criteria not met',s:'ok',nx:'Era'}]}
  },ends:{
    Eac:{type:'esc',tag:'MTP activated',title:'Activate Massive Transfusion Protocol',body:'Call BloodTrack. Issue Package 1: 4 pRBC, 4 FFP, 1 platelet apheresis. Assign RN for blood. Reassess every 30 minutes.'},
    Era:{type:'clr',tag:'MTP not indicated',title:'Continue Assessment',body:'Does not meet MTP criteria. Continue resuscitation with crystalloid and type-and-screen. Reassess in 15 minutes.'}
  }},
  vascular:{start:'v0',nodes:{
    v0:{q:'Primary injury type?',k:'Injury classification',opts:[{l:'Vascular or nerve/tendon',s:'warn',nx:'v1'},{l:'Bony or soft-tissue only',s:'ok',nx:'v2'}]},
    v1:{q:'Hard signs of vascular injury present?',k:'Vascular assessment',info:'Pulsatile bleeding · Expanding hematoma · Absent distal pulse · Bruit or thrill · Ischemic limb',opts:[{l:'Yes — hard signs',s:'warn',nx:'Evo'},{l:'Soft signs only or none',s:'ok',nx:'Evi'}]},
    v2:{q:'Open fracture or significant soft-tissue loss?',k:'Open injury screen',opts:[{l:'Yes — open fracture',s:'warn',nx:'Eoo'},{l:'No — closed injury',s:'ok',nx:'Eoc'}]}
  },ends:{
    Evo:{type:'esc',tag:'Operative',title:'Immediate Vascular Surgery',body:'Hard signs of vascular injury. Notify vascular surgery immediately. Tourniquet if active extremity hemorrhage. Activate OR.'},
    Evi:{type:'ok',tag:'CT angiography',title:'CTA and Vascular Consult',body:'CTA of injured extremity if hemodynamically stable. Vascular surgery notification. Duplex for proximity injuries.'},
    Eoo:{type:'ok',tag:'Ortho consult',title:'Open Fracture — Orthopedic Consult',body:'Follow Open Fracture Protocol for antibiotic timing. Emergent ortho consult for washout and fixation.'},
    Eoc:{type:'clr',tag:'Non-urgent',title:'Closed Injury — Ortho Evaluation',body:'Splint in position of function. Orthopedic consult within 24 hours.'}
  }},
  tbi_mild:{start:'m0',nodes:{
    m0:{q:'GCS 15 at time of evaluation?',k:'GCS assessment',opts:[{l:'No — GCS 13 or 14',s:'warn',nx:'Egl'},{l:'Yes — GCS 15',s:'ok',nx:'m1'}]},
    m1:{q:'PECARN high-risk features present?',k:'High-risk screen',info:'Age < 2: occipital/parietal/temporal hematoma, LOC > 5 sec, severe mechanism, not acting normally per caregiver',opts:[{l:'Yes — high-risk features',s:'warn',nx:'Ect'},{l:'No',s:'ok',nx:'m2'}]},
    m2:{q:'Intermediate-risk features present?',k:'Intermediate-risk screen',info:'Vomiting · LOC any duration · Severe headache · Not acting normally',opts:[{l:'Yes — intermediate risk',s:'warn',nx:'Ecc'},{l:'No — low risk',s:'ok',nx:'Ecn'}]}
  },ends:{
    Egl:{type:'esc',tag:'Escalate',title:'GCS 13-14: TBI Severe Protocol',body:'GCS 13-14 meets TBI Severe ED criteria. Do not manage as mild TBI.'},
    Ect:{type:'ok',tag:'CT indicated',title:'CT Head Indicated',body:'Non-contrast CT head. If abnormal: neurosurgery consult and PICU. If normal: observe or discharge with precautions.'},
    Ecn:{type:'clr',tag:'CT not indicated',title:'CT Not Routinely Indicated',body:'Low PECARN risk. Observe 4-6 hours. Discharge if GCS 15 and asymptomatic with head injury precautions.'},
    Ecc:{type:'ok',tag:'Clinical judgment',title:'CT at Clinician Discretion',body:'Intermediate risk. Discuss CT risk-benefit with family. Observation is an alternative. Shared decision-making.'}
  }},
  tbi_severe:{start:'ts0',nodes:{
    ts0:{q:'Is the patient protecting their airway? (GCS < 13)',k:'Airway assessment',opts:[{l:'No — airway not protected',s:'warn',nx:'tsr'},{l:'Yes — airway protected',s:'ok',nx:'ts1'}]},
    tsr:{q:'RSI performed — airway secured?',k:'RSI airway management',info:'Ketamine 1-2 mg/kg IV preferred. Etomidate 0.3 mg/kg if ICP concern. Rocuronium 1 mg/kg IV.',opts:[{l:'Yes — airway secured',s:'ok',nx:'ts1'},{l:'Difficult — surgical airway needed',s:'warn',nx:'Esa'}]},
    ts1:{q:'CT head and C-spine obtained and reviewed?',k:'Imaging',info:'Non-contrast CT head. CT C-spine. Consider CTA if vascular injury suspected.',opts:[{l:'Yes — imaging complete',s:'ok',nx:'ts2'},{l:'No — patient too unstable',s:'warn',nx:'Epd'}]},
    ts2:{q:'CT shows surgical lesion requiring intervention?',k:'Imaging result',info:'EDH > 1 cm · SDH with shift > 5 mm · Depressed skull fracture · Hemorrhagic contusion with mass effect',opts:[{l:'Yes — surgical lesion',s:'warn',nx:'Eno'},{l:'No — non-operative',s:'ok',nx:'Epi'}]}
  },ends:{
    Esa:{type:'esc',tag:'Surgical airway',title:'Emergent Surgical Airway',body:'Cricothyrotomy per difficult airway algorithm. Activate airway team. Document all attempts.'},
    Epd:{type:'ok',tag:'PICU direct',title:'PICU Admission — CT Deferred',body:'Empiric ICP management. Bedside neuromonitoring. CT when stabilized. Neurosurgery notification required.'},
    Eno:{type:'esc',tag:'Operative',title:'Emergent Neurosurgery — Activate OR',body:'Notify neurosurgery attending immediately. Activate OR. Hyperventilate to pCO2 30-35 if herniation. Mannitol 0.5-1 g/kg IV.'},
    Epi:{type:'ok',tag:'ICP monitoring',title:'PICU with ICP Monitoring',body:'Neurosurgery consult for ICP monitor. Initiate Phase I TBI ICP protocol. HOB 30°, normothermia, normocapnia.'}
  }},
  tbi_icp:{start:'i0',nodes:{
    i0:{q:'Current ICP management phase?',k:'ICP Monitoring — phase selection',opts:[{l:'Beginning Phase I management',s:'ok',nx:'i1'},{l:'Phase I failed — ICP still above 20',s:'warn',nx:'i2'}]},
    i1:{q:'Phase I interventions in place?',k:'Phase I — Initial management',checks:['HOB at 30 degrees','Head midline positioning','Adequate sedation and analgesia','Normothermia maintained','CO2 target 35-40 mmHg'],opts:[{l:'Yes — ICP now controlled',s:'ok',nx:'Eik'},{l:'No — ICP remains above 20',s:'warn',nx:'i2'}]},
    i2:{q:'Phase II interventions applied?',k:'Phase II — Refractory ICP',checks:['Hypertonic saline or mannitol administered','Continuous EEG if seizure suspected','Neurosurgery notified'],opts:[{l:'Yes — ICP now controlled',s:'ok',nx:'Eik'},{l:'ICP remains refractory',s:'warn',nx:'Eip'}]}
  },ends:{
    Eik:{type:'clr',tag:'ICP controlled',title:'ICP Controlled — Continue Monitoring',body:'Maintain interventions. ICP monitoring hourly. Reassess GCS and pupils q2h. Wean per neurosurgery guidance.'},
    Eip:{type:'esc',tag:'Phase III',title:'Phase III — Escalate Immediately',body:'Notify neurosurgery. Consider decompressive craniectomy, pentobarbital, or hypothermia. Transfer if resources unavailable.'}
  }},
  ir:{start:'ir0',nodes:{
    ir0:{q:'Is the trauma patient being transported to IR after hours?',k:'IR After Hours — activation',info:'This protocol applies when trauma patients require interventional radiology outside standard operating hours.',opts:[{l:'Yes — proceed to transport protocol',s:'neutral',nx:'ir1'}]},
    ir1:{q:'Pre-transport checklist complete?',k:'Pre-transport responsibilities',checks:['Patient ID and consent confirmed','Monitoring equipment at bedside','Emergency medications prepared','Trauma attending notified'],opts:[{l:'Checklist complete — transport ready',s:'neutral',nx:'Eir'}]}
  },ends:{
    Eir:{type:'clr',tag:'Handoff complete',title:'IR Transport and Handoff',body:'Verbal handoff to IR team completed. Trauma RN monitors continuously. Document transport events in EMR on return.'}
  }},
  open_fx:{start:'of0',nodes:{
    of0:{q:'Gustilo-Anderson fracture type?',k:'Open Fracture — classification',opts:[{l:'Type I or II (< 1 cm or < 10 cm, minimal contamination)',s:'ok',nx:'of1'},{l:'Type III (> 10 cm, high-energy, or contamination)',s:'warn',nx:'of3'}]},
    of1:{q:'Patient weight?',k:'Type I and II — antibiotic dosing',opts:[{l:'Under 40 kg',s:'ok',nx:'Eal'},{l:'40 kg or greater',s:'warn',nx:'Eas'}]},
    of3:{q:'Gross contamination or aquatic/farmyard injury?',k:'Type III — contamination',opts:[{l:'Yes — gross contamination or aquatic',s:'warn',nx:'Eab'},{l:'No — high-energy without heavy contamination',s:'ok',nx:'Eaa'}]}
  },ends:{
    Eal:{type:'clr',tag:'Antibiotic regimen',title:'Cefazolin 50 mg/kg IV (max 2 g)',body:'Within 1 hour of injury. Repeat q8h until wound closure or 24 hrs post-op. Tetanus prophylaxis per vaccination status.'},
    Eas:{type:'clr',tag:'Antibiotic regimen',title:'Cefazolin 2 g IV',body:'Within 1 hour of injury. Repeat q8h until wound closure or 24 hrs post-op. Tetanus prophylaxis per vaccination status.'},
    Eaa:{type:'ok',tag:'Antibiotic regimen',title:'Cefazolin + Gentamicin',body:'Cefazolin 50 mg/kg (max 2 g) + Gentamicin 2.5 mg/kg IV. Within 1 hour. Operative washout within 6 hours. Tetanus required.'},
    Eab:{type:'esc',tag:'Broad-spectrum',title:'Cefazolin + Gentamicin + Metronidazole',body:'Add Metronidazole 15 mg/kg IV. For aquatic injuries: substitute Pip-Tazo for cefazolin. Emergent washout. Tetanus required.'}
  }},
  long_bone:{start:'lb0',nodes:{
    lb0:{q:'Multiply injured patient (ISS > 15)?',k:'Patient classification',opts:[{l:'Yes — multiply injured',s:'warn',nx:'lb1'},{l:'No — isolated long bone fracture',s:'ok',nx:'lbi'}]},
    lb1:{q:'Hemodynamically stable for definitive fixation?',k:'Multiply injured — stability',opts:[{l:'No — damage control phase',s:'warn',nx:'Edc'},{l:'Yes — stable',s:'ok',nx:'Eed'}]},
    lbi:{q:'Neurovascular status of limb intact?',k:'Isolated fracture — NV check',opts:[{l:'No — NV compromise',s:'warn',nx:'Euf'},{l:'Yes — NV intact',s:'ok',nx:'Etm'}]}
  },ends:{
    Edc:{type:'esc',tag:'Damage control',title:'Damage Control Orthopaedics',body:'Temporary stabilization with splint or external fixator. Definitive fixation deferred until physiology corrected. Reassess 24-72 hours.'},
    Eed:{type:'ok',tag:'Early definitive',title:'Early Definitive Fixation (within 24 hrs)',body:'Stable multiply injured patient. Early fixation reduces pulmonary complications. Coordinate with trauma and anesthesia.'},
    Euf:{type:'esc',tag:'Urgent fixation',title:'Urgent Operative Intervention',body:'NV compromise requires urgent reduction. Notify orthopaedics immediately. Vascular surgery standby if arterial injury suspected.'},
    Etm:{type:'clr',tag:'Semi-elective',title:'Definitive Fixation within 24-48 Hours',body:'Isolated fracture with intact NV. Splint in position of function. Pain control and limb elevation.'}
  }},

let scr='home', cat=null, proto=null, nid='', hist=[], drawer=false;

// ── TREE HELPERS ──────────────────────────────────────────────────
function tobj(){return proto&&T[proto.id]?T[proto.id]:null;}
function nds(){const t=tobj();return t?t.nodes:{};}
function ends(){const t=tobj();return t?t.ends:{};}
function dn(){return Object.keys(nds());}

// ── MAIN RENDER ───────────────────────────────────────────────────
function r(){
  const co=document.getElementById('content');
  const nb=document.getElementById('navBack');
  const nt=document.getElementById('ntitle');
  const ns=document.getElementById('nstep');
  const tb=document.getElementById('tabbar');
  const fab=document.getElementById('fab');
  const inP=scr==='tree'||scr==='terminal';
  tb.style.display=inP?'none':'flex';
  const tt=document.getElementById('themeToggle');if(tt)tt.style.display=scr==='home'?'flex':'none';
  if(fab)fab.style.bottom=(inP?14:74)+'px';
  nb.classList.toggle('v',scr!=='home');
  ns.textContent='';
  if(scr==='home'){nt.textContent='CHOA Trauma Protocols';}
  else if(scr==='browse'){document.getElementById('blbl').textContent='Back';nt.textContent=cat.short;}
  else if(scr==='tree'){
    document.getElementById('blbl').textContent=hist.length?'Undo':'Back';
    nt.textContent=proto?proto.name:'';
    const i=dn().indexOf(nid);
    if(i>=0)ns.textContent=(i+1)+' / '+dn().length;
  }
  else if(scr==='terminal'){
    document.getElementById('blbl').textContent='Undo';
    nt.textContent=proto?proto.name:'';
  }
  co.innerHTML={home:homeH,browse:browseH,tree:treeH,terminal:termH}[scr]();
  co.scrollTop=0;
}

const CAT_TAGLINES={

function defaultContent(){
  const cards=Object.keys(C).map(k=>{
    const c=C[k];
    return`<button class="cat-card" onclick="openCat('${k}')">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px">
        <div style="display:flex;align-items:center;justify-content:center;width:28px;height:28px;color:var(--cat-${k})" aria-hidden="true">${ico(c.icon,26)}</div>
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="color:var(--border2);margin-top:3px;flex-shrink:0"><path d="M9 6l6 6l-6 6"/></svg>
      </div>
      <div style="font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--cat-${k});margin-bottom:6px">${c.protos.length} protocols</div>
      <div style="font-size:16.5px;font-weight:700;color:var(--t1);letter-spacing:-.025em;line-height:1.2;margin-bottom:7px">${c.label}</div>
      <div style="font-size:12px;color:var(--t3);line-height:1.55">${CAT_TAGLINES[k]||''}</div>
    </button>`;
  }).join('');
  return`<div class="sh">Categories</div><div class="cats-grid">${cards}</div>`;
}

function searchResultsHTML(q){
  const ql=q.trim().toLowerCase();
  if(!ql)return defaultContent();
  const res=[];
  Object.keys(C).forEach(cid=>{
    const c=C[cid];
    c.protos.forEach(p=>{
      if(p.name.toLowerCase().includes(ql)||p.policy.toLowerCase().includes(ql)||c.label.toLowerCase().includes(ql)||TL[p.type].toLowerCase().includes(ql))
        res.push({p,c});
    });
  });
  if(!res.length)return`<div class="nores">No protocols matching <strong>"${q.replace(/</g,'&lt;')}"</strong><br><span style="font-size:12px">Try a condition, protocol name, or category</span></div>`;
  const rows=res.map(({p,c})=>`<button class="pr" onclick="openById('${p.id}')"><div class="pbar" style="background:var(--cat-${c.key})" aria-hidden="true"></div><div class="pin"><div class="pna">${p.name}</div><div class="pm"><span class="pty" style="background:var(--tb-${p.type});color:var(--tc-${p.type})">${TL[p.type]}</span><span class="ppo">${c.short}</span></div></div><span class="pch" aria-hidden="true"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 6l6 6l-6 6"/></svg></span></button>`).join('');
  return`<div class="sh">${res.length} result${res.length>1?'s':''} for "${q.replace(/</g,'&lt;')}"</div><div class="cl">${rows}</div>`;
}

function homeH(){
  const clrBtn=sq?`<button class="sclr" onclick="clearSearch()" aria-label="Clear search"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6l-12 12"/><path d="M6 6l12 12"/></svg></button>`:'';
  return`<div class="so"><label class="sb" for="srch"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="color:var(--t3);flex-shrink:0"><circle cx="10" cy="10" r="7"/><path d="M21 21l-6 -6"/></svg><input type="search" id="srch" placeholder="Search protocols, conditions, medications" value="${sq.replace(/"/g,'&quot;')}" oninput="handleSearch(this.value)" autocomplete="off" aria-label="Search protocols">${clrBtn}</label></div><div id="srchResults">${sq?searchResultsHTML(sq):defaultContent()}</div>`;
}

// KEY FIX: update only the results div, keep the input focused
function handleSearch(q){
  sq=q;
  const el=document.getElementById('srchResults');
  if(el)el.innerHTML=searchResultsHTML(q);
  // Update clear button visibility without re-rendering input
  const existing=document.querySelector('.sclr');
  const sb=document.querySelector('.sb');
  if(sb){
    if(q&&!existing){
      const btn=document.createElement('button');
      btn.className='sclr';btn.setAttribute('aria-label','Clear search');
      btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6l-12 12"/><path d="M6 6l12 12"/></svg>';
      btn.onclick=clearSearch;
      sb.appendChild(btn);
    }else if(!q&&existing){
      existing.remove();
    }
  }
}

function clearSearch(){
  sq='';
  const inp=document.getElementById('srch');
  const el=document.getElementById('srchResults');
  const clr=document.querySelector('.sclr');
  if(inp){inp.value='';inp.focus();}
  if(clr)clr.remove();
  if(el)el.innerHTML=defaultContent();
}

// ── BROWSE ────────────────────────────────────────────────────────
function browseH(){
  const rows=cat.protos.map(p=>`<button class="pr" onclick="openById('${p.id}')"><div class="pbar" style="background:var(--cat-${cat.key})" aria-hidden="true"></div><div class="pin"><div class="pna">${p.name}</div><div class="pm"><span class="pty" style="background:var(--tb-${p.type});color:var(--tc-${p.type})">${TL[p.type]}</span><span class="ppo">${p.policy}</span></div></div><span class="pch" aria-hidden="true"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 6l6 6l-6 6"/></svg></span></button>`).join('');

}

// ── TREE ──────────────────────────────────────────────────────────
function treeH(){
  const nd=nds()[nid];if(!nd)return'';
  const i=dn().indexOf(nid);
  const dots=dn().map((_,j)=>`<div class="dot${j<i?' dn':j===i?' dc':''}" aria-hidden="true"></div>`).join('');
  const isRef=nd.opts&&nd.opts.length===1;
  let b=`<div class="tw"><div class="prg" role="progressbar" aria-valuenow="${i+1}" aria-valuemin="1" aria-valuemax="${dn().length}">${dots}</div><p class="tk">${nd.k}</p><h2 class="tq">${nd.q}</h2>`;
  if(nd.info)b+=`<div class="tif">${nd.info}</div>`;
  if(nd.checks){
    const allCkd=nd.checks.every((_,i)=>checkedItems.has(i));
    b+=`<div class="tck">${nd.checks.map((c,j)=>`<button class="tckr${checkedItems.has(j)?' ckd':''}" onclick="toggleCheck(${j})" aria-pressed="${checkedItems.has(j)}"><div class="tcci" aria-hidden="true"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5l10 -10"/></svg></div><span>${c}</span></button>`).join('')}</div>`;
    if(!allCkd)b+=`<p class="ck-hint">Check all items above to continue</p>`;
    b+=`<div class="ots">${nd.opts.map(o=>{
      const s=isRef?'neutral':o.s;
      const tag=isRef?'Proceed':o.s==='ok'?'Yes — proceed':'No — escalate';
      return`<button class="ob ${s}" onclick="pick('${o.nx}','${o.l.replace(/'/g,"\\'")}')"`+(allCkd?'':' disabled')+`><div class="ostr ${s}" aria-hidden="true"></div><div class="obd"><span class="otg">${tag}</span><span class="olb">${o.l}</span></div></button>`;
    }).join('')}</div>`;
  } else if(nd.riskCalc){
    const rc=nd.riskCalc;
    const count=rc.factors.filter((_,i)=>checkedItems.has(i)).length;
    const isHigh=count>=rc.threshold;
    const cls=count===0?'':isHigh?'high':'mod';
    const badge=count===0?'NONE SELECTED':isHigh?'HIGH RISK':'MODERATE';
    const desc=(count===1?'1 factor':count+' factors')+' selected · 2 or more = High Risk';
    const nx=isHigh?rc.nxHigh:rc.nxLow;
    const ans=`${count} VTE risk factor${count===1?'':'s'} — ${isHigh?'High':'Moderate'} risk`;
    const btnCls=isHigh?'warn':'ok';
    const btag=isHigh?'High risk pathway':'Moderate risk pathway';
    const lbl=count===0?'No factors selected — Continue (Moderate risk)':
               `Continue — ${isHigh?'High':'Moderate'} Risk (${count} factor${count===1?'':'s'})`;
    b+=`<div class="tck">${rc.factors.map((f,j)=>`<button class="tckr${checkedItems.has(j)?' ckd':''}" onclick="toggleCheck(${j})" aria-pressed="${checkedItems.has(j)}"><div class="tcci" aria-hidden="true"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5l10 -10"/></svg></div><span>${f}</span></button>`).join('')}</div>`;
    b+=`<div class="risk-ctr ${cls}" id="risk-ctr"><span class="risk-ct">${count}</span><div class="risk-info"><div class="risk-desc">${desc}</div><span class="risk-lv">${badge}</span></div></div>`;
    b+=`<div class="ots" id="risk-ots"><button class="ob ${btnCls}" onclick="pick('${nx}','${ans.replace(/'/g,"\'")}')"><div class="ostr ${btnCls}" aria-hidden="true"></div><div class="obd"><span class="otg">${btag}</span><span class="olb">${lbl}</span></div></button></div>`;
  } else {
    b+=`<div class="ots">${nd.opts.map(o=>{
      const s=isRef?'neutral':o.s;
      const tag=isRef?'Proceed':o.s==='ok'?'Yes — proceed':'No — escalate';
      return`<button class="ob ${s}" onclick="pick('${o.nx}','${o.l.replace(/'/g,"\\'")}')"><div class="ostr ${s}" aria-hidden="true"></div><div class="obd"><span class="otg">${tag}</span><span class="olb">${o.l}</span></div></button>`;
    }).join('')}</div>`;
  }
  if(hist.length){
    const hl=hist.length;
    b+=`<button class="trb" onclick="openDrawer()" aria-haspopup="dialog"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="color:var(--blue)"><path d="M13 5h8"/><path d="M13 9h5"/><path d="M13 15h8"/><path d="M13 19h5"/><rect x="3" y="4" width="6" height="6" rx="1"/><rect x="3" y="14" width="6" height="6" rx="1"/></svg><span>${hl} decision${hl>1?'s':''} logged</span><span style="margin-left:auto;color:var(--border2)" aria-hidden="true"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 6l6 6l-6 6"/></svg></span></button>`;
  }
  if(drawer){
    const items=hist.map((h,j)=>{const n=nds()[h.nid];return`<div class="drwr"><div class="drwn" aria-hidden="true">${j+1}</div><div><div class="drwq">${n?n.q:''}</div><div class="drwa">${h.ans}</div></div></div>`;}).join('');
    b+=`<div class="drww" role="dialog" aria-modal="true"><div class="drwo" onclick="closeDrawer()"></div><div class="drwd"><div class="drwh"><span class="drwl">Decision trail</span><button class="drwc" onclick="closeDrawer()" aria-label="Close"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6l-12 12"/><path d="M6 6l12 12"/></svg></button></div>${items}</div></div>`;
  }
  return b+'</div>';
}

// ── TERMINAL ──────────────────────────────────────────────────────
function termH(){
  const e=ends()[nid];if(!e)return'';
  const path=hist.map((h,i)=>`<div class="tmpr"><div class="tmpn" aria-hidden="true">${i+1}</div><div class="tmpa">${h.ans}</div></div>`).join('');
  return`<div class="tmw"><div class="tmc ${e.type}"><div class="tmtg"><div class="tmdot" aria-hidden="true"></div>${e.tag}</div><h2 class="tmti">${e.title}</h2><p class="tmbd">${e.body}</p></div><div class="tmpath">${path}</div><button class="bp" onclick="startTree()">Start pathway over</button><button class="bg2" onclick="scr='browse';r()">Back to ${cat?cat.short:'protocols'}</button></div>`;
}

// ── NAVIGATION ────────────────────────────────────────────────────
function goHome(){scr='home';cat=null;proto=null;nid='';hist=[];drawer=false;sq='';setTab('home');r();}
function openCat(k){sq='';cat=C[k];scr='browse';drawer=false;r();}
function openById(id){sq='';const e=LU[id];if(!e)return;proto=e.p;cat=C[e.cid];startTree();}
function toggleCheck(idx){
  if(checkedItems.has(idx))checkedItems.delete(idx);else checkedItems.add(idx);
  const nd=nds()[nid];if(!nd)return;

  if(nd.riskCalc){
    // Count-based routing for VTE-style calculators
    const rc=nd.riskCalc;
    const count=rc.factors.filter((_,i)=>checkedItems.has(i)).length;
    const isHigh=count>=rc.threshold;
    // Update clicked row
    const row=document.querySelector(`.tckr[onclick="toggleCheck(${idx})"]`);
    if(row){row.classList.toggle('ckd',checkedItems.has(idx));row.setAttribute('aria-pressed',checkedItems.has(idx));}
    // Update counter card
    const ctr=document.getElementById('risk-ctr');
    if(ctr){
      ctr.className='risk-ctr '+(count===0?'':isHigh?'high':'mod');
      const ct=ctr.querySelector('.risk-ct');if(ct)ct.textContent=count;
      const desc=ctr.querySelector('.risk-desc');
      if(desc)desc.textContent=(count===1?'1 factor':count+' factors')+' selected · 2 or more = High Risk';
      const lv=ctr.querySelector('.risk-lv');
      if(lv)lv.textContent=count===0?'NONE SELECTED':isHigh?'HIGH RISK':'MODERATE';
    }
    // Update continue button
    const ots=document.getElementById('risk-ots');
    if(ots){
      const nx=isHigh?rc.nxHigh:rc.nxLow;
      const ans=(count+' VTE risk factor'+(count===1?'':'s')+' — '+(isHigh?'High':'Moderate')+' risk').replace(/'/g,"\'");
      const btnCls=isHigh?'warn':'ok';
      const btag=isHigh?'High risk pathway':'Moderate risk pathway';
      const lbl=count===0?'No factors selected — Continue (Moderate risk)':
                 'Continue — '+(isHigh?'High':'Moderate')+' Risk ('+count+' factor'+(count===1?'':'s')+')';
      ots.innerHTML=`<button class="ob ${btnCls}" onclick="pick('${nx}','${ans}')"><div class="ostr ${btnCls}" aria-hidden="true"></div><div class="obd"><span class="otg">${btag}</span><span class="olb">${lbl}</span></div></button>`;
    }
    return;
  }

  // Original all-required logic for regular checklists
  const allCkd=nd.checks&&nd.checks.every((_,i)=>checkedItems.has(i));
  if(nd.checks){
    nd.checks.forEach((_,i)=>{
      const btn=document.querySelector(`.tckr[onclick="toggleCheck(${i})"]`);
      if(btn){btn.classList.toggle('ckd',checkedItems.has(i));btn.setAttribute('aria-pressed',checkedItems.has(i));}
    });
    document.querySelectorAll('.ob').forEach(b=>b.disabled=!allCkd);
    const hint=document.querySelector('.ck-hint');
    if(hint)hint.style.display=allCkd?'none':'block';
  }
}
function startTree(){const t=tobj();if(!t)return;nid=t.start;hist=[];drawer=false;checkedItems=new Set();scr='tree';r();}
function pick(nx,ans){hist.push({nid,ans});nid=nx;drawer=false;checkedItems=new Set();scr=ends()[nid]?'terminal':'tree';r();}
function goBack(){
  drawer=false;checkedItems=new Set();
  if(scr==='terminal'){if(hist.length){const p=hist.pop();nid=p.nid;scr='tree';}else scr='browse';r();return;}
  if(scr==='tree'){if(hist.length){const p=hist.pop();nid=p.nid;}else scr='browse';r();return;}
  if(scr==='browse'){scr='home';cat=null;setTab('home');r();return;}
}
function openDrawer(){drawer=true;r();}
function closeDrawer(){drawer=false;r();}
function switchTab(id){setTab(id);if(id==='home')goHome();else{sq='';cat=C[id];scr='browse';drawer=false;r();}}
function setTab(id){
  document.querySelectorAll('.tab').forEach(t=>{
    const on=t.id.replace('t-','')===id;
    t.classList.toggle('on',on);
    t.setAttribute('aria-current',on?'true':'false');
  });
}

// ── THEME ─────────────────────────────────────────────────────────
const ICON_MOON='<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6.4 6.4 0 0 0 9 9a9 9 0 1 1 -9 -9z"/></svg>';
const ICON_SUN='<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="M4.9 4.9l1.4 1.4"/><path d="M17.7 17.7l1.4 1.4"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="M4.9 19.1l1.4 -1.4"/><path d="M17.7 6.3l1.4 -1.4"/></svg>';
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  try{localStorage.setItem('choa-theme',t);}catch(e){}
  const tt=document.getElementById('themeToggle');
  if(tt){tt.innerHTML=t==='dark'?ICON_SUN:ICON_MOON;tt.setAttribute('aria-label',t==='dark'?'Switch to light mode':'Switch to dark mode');}
}
function toggleTheme(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');}
applyTheme((function(){try{return localStorage.getItem('choa-theme')||'light';}catch(e){return 'light';}})());

r();
</script>
